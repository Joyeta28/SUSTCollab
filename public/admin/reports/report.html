<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUSTCollab | Admin | Reports</title>
    <link rel="stylesheet" href="report.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>


<body>
    <div class="sidebar">
        <div class="logo">SUSTCollab</div>

        <div class="profile">
            <div class="profile">
                <div class="profile-avatar" id="sidebarAvatar">J</div>
                <h3 id="UserName">Loading...</h3>
            </div>
        </div>

        <div class="menu">
            <a href="/admin/dashboard/dashboard.html"><i class="fa-solid fa-chart-bar"></i> Dashboard</a>
            <a href="/admin/users/user.html"><i class="fa-solid fa-users"></i> Users</a>
            <a href="#"><i class="fa-solid fa-circle-exclamation"></i> Reports</a>
            <a href="#" id="logout-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
        </div>
    </div>

    <div class="main">
        <div class="feed">
            <h2>User Reports</h2>

            <table id="reportTable">
                <thead>
                    <tr>
                        <th>Reporter</th>
                        <th>Reported User</th>
                        <th>Profile</th>
                        <th>Reason</th>
                        <th>Status</th>
                        <th>Details</th>
                    </tr>
                </thead>

                <tbody id="reportBody"></tbody>

            </table>
        </div>

    </div>


    <script src="report.js"></script>

</body>

</html>
