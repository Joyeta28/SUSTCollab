<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUSTCollab | Admin | User Details</title>
    <link rel="stylesheet" href="userDetails.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="sidebar">
        <div class="logo">SUSTCollab</div>
        <div class="profile-container">

            <div class="profile-card">
                <div class="profile-avatar"></div>
                <h2 class="username">Test</h2>
                <p class="email">test@gmail.com</p>
                <div class="section">
                    <div class="section-header">
                        <h3>About</h3>
                    </div>
                    <p class="about-text"></p>
                </div>
                <div class="section">
                    <h3>Registration Number</h3>
                    <p class="regi_num"></p>
                </div>
                <div class="section">
                    <h3>Department</h3>
                    <p class="dept"></p>
                </div>
                <div class="section">
                    <div class="section-header">
                        <h3>Skills</h3>
                    </div>
                    <div class="skills">
                        <p class="skill-text"></p>
                    </div>
                    
                </div>
                <div class="space"></div>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="topbar">
            <input type="text" placeholder="🔍Search projects..." class="search-box">
            <button class="my-projects-btn" id="myProjectsBtn">Projects</button>
            <button class="delete-user-btn" onclick="deleteUser()">Delete User</button>
        </div>

        <div class="feed">

            <div class="request-modal hidden" id="projectModal">
                <div class="request-box">
                    <div class="request-header">
                        <h2>My Projects</h2>
                        <button id="closeProjectBtn"> ✖</button>
                    </div>
                    <div id="projectContainer"></div>
                </div>
            </div>

            <div id="post-container">

            </div>

        </div>
    </div>

    <script src="userDetails.js"></script>

</body>

</html>
