<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUSTCollab | Home</title>
    <link rel="stylesheet" href="analytics.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="sidebar">
        <div class="logo">SUSTCollab</div>

        <div class="profile">
            <div class="profile">
                <div class="profile-avatar" id="sidebarAvatar">J</div>
                <h3 id="UserName">Loading...</h3>
            </div>
        </div>

        <div class="menu">
            <a href="#" id="profile-link"><i class="fa-solid fa-user"></i> My Profile</a>
            <a href="#"><i class="fa-solid fa-house"></i> Home</a>
            <a href="#" id="logout-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
            <a href="#" id="delete-account"><i class="fa-solid fa-delete-left"></i> Delete Account</a>
            <a href="#" id="delete-account"><i class="fa-solid fa-analytics"></i>Analytics</a>
        </div>
    </div>

    <div class="main">
        <div class="topbar">
            <h2>User Analytics</h2>

        </div>

        <div class="feed">

            <div id="analytics-container">
                <h3>Analytics</h3>
                <div class="analytics-card">
                    <div class="card-icon">📌</div>

                    <div class="card-content">
                        <h3 id="total-posts">0</h3>
                        <p>Total Posts Created</p>
                    </div>
                </div>
 
                <button class="request-btn">Sent Requests</button>
                <button class="request-btn">Acceptance Rate</button>
                <button class="request-btn">Total Posts</button>
                <a  class="request-btn" href="/countRequest/requests.html">Requests</a>
                <button class="request-btn">Most Used Catagories</button>

                
                <button class="request-btn">Post Per Day</button>
                <button class="request-btn">Requests Per Day</button>
                <button class="request-btn">Posts per Catagories</button>


            </div>

        </div>

    </div>

    <script src="analytics.js"></script>

</body>

</html>
