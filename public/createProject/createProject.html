<!DOCTYPE html>
<html lang="en">

<head>
    <title>Create Project</title>
    <link rel="stylesheet" href="../createProject/createProject.css">
</head>

<body>
    <form id="projectForm">
        <h3>Add Your Projects</h3>
        <input type="text" id="title" placeholder="Project Title" required>
        <textarea id="description" placeholder="Short Description"></textarea>
        <input type="text" id="techStack" placeholder="React, Node.js, MySQL">
        <input type="text" id="githubLink" placeholder="GitHub Link">
        <button type="submit">Add Project</button>
    </form>
    <script src="../createProject/createProject.js"></script>
</body>

</html>
