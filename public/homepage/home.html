<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUSTCollab | Home</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="sidebar">
        <div class="logo">SUSTCollab</div>

        <div class="profile">
            <div class="profile">
                <div class="profile-avatar" id="sidebarAvatar">J</div>
                <h3 id="UserName">Loading...</h3>
            </div>
        </div>

        <div class="menu">
            <a href="#" id="profile-link"><i class="fa-solid fa-user"></i> My Profile</a>
            <a href="#"><i class="fa-solid fa-house"></i> Home</a>
            <a href="#" id="logout-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
            <a href="#" id="delete-account"><i class="fa-solid fa-delete-left"></i> Delete Account</a>
        </div>
    </div>

    <div class="main">
        <div class="topbar">
            <input type="text" id="searchInput" placeholder="🔍Search projects..." class="search-box">
            
            <select id="categoryFilter" class="filter-btn">
                <option value="">All Categories</option>
                <option value="Web Development">Web Development</option>
                <option value="Mobile App">Mobile App</option>
                <option value="AI/ML">AI/ML</option>
                <option value="Database">Database</option>
                <option value="Networking">Networking</option>
            </select>

            <a href="/user/user.html" class="create-btn">Search Users</a>
            <a href="/createPost/createPost.html" class="create-btn">+ Create Post</a>

        </div>

        <div class="feed">

            <div id="post-container">

            </div>

        </div>

    </div>

    <script src="home.js"></script>

</body>

</html>
