<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUSTCollab Home</title>
    <link rel="stylesheet" href="profile.css">
</head>

<body>
    <div class="sidebar">
        <div class="logo">SUSTCollab</div>
        <div class="profile-container">

            <div class="profile-card">
                <div class="profile-avatar"></div>
                <h2 class="username">Test</h2>
                <p class="email">test@gmail.com</p>
                <div class="section">
                    <div class="section-header">
                        <h3>About</h3>
                        <button class="small-edit-btn edit-bio-btn">
                            Edit
                        </button>
                    </div>
                    <p class="about-text"></p>
                    <div class="bio-edit-box hidden">
                        <textarea class="bio-input"></textarea>
                        <button class="save-bio-btn">Save</button>
                    </div>
                </div>
                <div class="section">
                    <h3>Registration Number</h3>
                    <p class="regi_num"></p>
                </div>
                <div class="section">
                    <h3>Department</h3>
                    <p class="dept"></p>
                </div>
                <div class="section">
                    <div class="section-header">
                        <h3>Skills</h3>
                        <button class="small-edit-btn edit-skill-btn">
                            Edit
                        </button>
                    </div>
                    <div class="skills"></div>
                    <div class="skill-edit-box hidden">
                        <input type="text" class="skill-input" placeholder="HTML, CSS, JavaScript">
                        <button class="save-skill-btn">Save</button>
                    </div>
                </div>
                <div class="space"></div>
            </div>
        </div>
    </div>
    </div>
    <div class="main">
        <div class="topbar">
            <input type="text" placeholder="🔍Search projects..." class="search-box">
            <a href="/createPost/createPost.html" class="create-btn">+ Create Post</a>

        </div>

        <div class="feed">
            <div id="post-container">
            </div>

        </div>
    </div>

    <script src="profile.js"></script>

</body>

</html>
