<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUSTCollab Home</title>
    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="sidebar">
        <div class="logo">SUSTCollab</div>
        <div class="profile-container">

            <div class="profile-card">
                <div class="profile-avatar"></div>
                <h2 class="username">Test</h2>
                <p class="email">test@gmail.com</p>
                <div class="section">
                    <div class="section-header">
                        <h3>About</h3>
                        <button class="small-edit-btn edit-bio-btn">
                            Edit
                        </button>
                    </div>
                    <p class="about-text"></p>
                    <div class="bio-edit-box hidden">
                        <textarea class="bio-input"></textarea>
                        <button class="save-bio-btn">Save</button>
                    </div>
                </div>
                <div class="section">
                    <h3>Registration Number</h3>
                    <p class="regi_num"></p>
                </div>
                <div class="section">
                    <h3>Department</h3>
                    <p class="dept"></p>
                </div>
                <div class="section">
                    <div class="section-header">
                        <h3>Skills</h3>
                        <button class="small-edit-btn edit-skill-btn">
                            Edit
                        </button>
                    </div>
                    <div class="profile-skills"></div>
                    <div class="skill-edit-box hidden">
                        <input type="text" class="skill-input" placeholder="HTML, CSS, JavaScript">
                        <button class="save-skill-btn">Save</button>
                    </div>
                </div>
                <div class="space"></div>
            </div>
        </div>
    </div>
    </div>
    <div class="main">
        <div class="topbar">
            <a href="/createProject/createProject.html" class="create-btn"> + Add Project</a>
            <button class="my-projects-btn" id="myProjectsBtn">My Projects</button>
            <a href="/createPost/createPost.html" class="create-btn">+ Create Post</a>
            <button class="view-request-btn" id="viewRequestsBtn">View Requests</button>
            <button class="my-requests-btn" id="mySentRequestBtn">My Requests</button>
        </div>

        <div class="feed">
            <div class="request-modal hidden" id="requestModal">
                <div class="request-box">
                    <div class="request-header">
                        <h2>Project Requests</h2>
                        <button id="closeRequestBtn">✖</button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Post Code</th>
                                <th>Post Details</th>
                                <th>User</th>
                                <th>Profile</th>
                                <th>Status</th>
                                <th>Accept</th>
                            </tr>
                        </thead>
                        <tbody id="requestTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="request-modal hidden" id="sentRequestModal">
                <div class="request-box">
                    <div class="request-header">
                        <h2>My Sent Requests</h2>
                        <button id="closeSentBtn">✖</button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Post Code</th>
                                <th>Post Details</th>
                                <th>Project</th>
                                <th>Owner</th>
                                <th>Profile</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="sentRequestTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="request-modal hidden" id="projectModal">
                <div class="request-box">
                    <div class="request-header">
                        <h2>My Projects</h2>
                        <button id="closeProjectBtn"> ✖</button>
                    </div>
                    <div id="projectContainer"></div>
                </div>
            </div>

            <div id="post-container">
            </div>

        </div>
    </div>

    <script src="profile.js"></script>

</body>

</html>
