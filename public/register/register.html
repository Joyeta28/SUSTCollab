<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUST Collab | User Registration</title>
    <link rel="stylesheet" href="register.css">
</head>

<body>
    <div class="register-container">
        <h1 class="logo">SUSTCollab</h1>
        <p class="subtitle">
            Create your collaboration account
        </p>
        <form id="registerForm">

            <label for="full_name">Full Name</label>
            <input type="text" name="full_name" id="full_name" placeholder="Enter Full Name" required>

            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="Enter Email" required>

            <label for="dept">Department</label>
            <select name="dept" id="dept">
                <option value="">Select Department</option>
                <option value="CSE">CSE</option>
                <option value="SWE">SWE</option>
                <option value="EEE">EEE</option>
                <option value="GEB">GEB</option>
                <option value="PME">PME</option>
                <option value="FET">FET</option>
                <option value="CEE">CEE</option>
                <option value="STAT">STAT</option>
                <option value="MATH">MATH</option>
                <option value="PHY">PHY</option>
                <option value="CHEM">CHEM</option>
                <option value="ENG">ENG</option>
            </select>
            <label for="regi_num">Registration Number</label>
            <input type="text" name="regi_num" id="regi_num" placeholder="Enter Registration Number">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="Enter Password" required>
            <label for="con_password">Confirm Password</label>
            <input type="password" name="con_password" id="con_password" placeholder="Confirm Password" required>
            <button class="register-btn" type="submit">Register</button>
        </form>
        <div class="bottom-text">
            Already have an account?
            <a href="../login/login.html">Login</a>
        </div>
    </div>
    <script src="register.js"></script>
</body>

</html>
