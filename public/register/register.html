<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="register-container">
        <h1 class="logo">SUSTCollab</h1>
        <p class="subtitle">
            Create your collaboration account
        </p>
        <form id="registerForm">
            <input type="text" name="full_name" id="full_name" placeholder="Full Name" required><br>
            <input type="email" name="email" id="email" placeholder="Email" required><br>
            <input type="password" name="password" id="password" placeholder="Password" required><br>
            <input type="password" name="con_password" id="con_password" placeholder="Confirm Password" required><br>
            <button class="register-btn" type="submit">Register</button>
        </form>
         <div class="bottom-text">
            Already have an account?
            <a href="../login/login.html">Login</a>
        </div>
    </div>
    <script src="register.js"></script>
</body>
</html>
