<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUSTCollab | Settings</title>
    <link rel="stylesheet" href="settings.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="settings-container">
        <div class="settings-header">
            <h1><i class="fa-solid fa-gear"></i> Settings</h1>
            <a href="/homepage/home.html">Back to Home</a>
        </div>

        <div class="settings-card">
            <h2>Change Password</h2>

            <input type="password" id="currentPassword" placeholder="Current password" class="settings-input">
            <input type="password" id="newPassword" placeholder="New password" class="settings-input">
            <input type="password" id="confirmPassword" placeholder="Confirm new password" class="settings-input">

            <button id="changePasswordBtn" class="settings-btn">Update Password</button>
        </div>


        <div class="settings-card">
            <h2>Notification Preferences</h2>

            <label class="settings-option">
                <span>Request notifications</span>
                <input type="checkbox" id="requestNotifications">
            </label>

            <label class="settings-option">
                <span>Project notifications</span>
                <input type="checkbox" id="projectNotifications">
            </label>

            <label class="settings-option">
                <span>Report notifications</span>
                <input type="checkbox" id="reportNotifications">
            </label>

            <button id="saveSettingsBtn" class="settings-btn">
                Save Preferences
            </button>
        </div>
    </div>

    <script src="settings.js"></script>
</body>
</html>
