<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUSTCollab Home</title>
    <link rel="stylesheet" href="userDetails.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="sidebar">
        <div class="logo">SUSTCollab</div>
        <div class="profile-container">

            <div class="profile-card">
                <div class="profile-avatar"></div>
                <h2 class="username">Test</h2>
                <p class="email">test@gmail.com</p>
                <div class="section">
                    <div class="section-header">
                        <h3>About</h3>
                    </div>
                    <p class="about-text"></p>
                </div>
                <div class="section">
                    <h3>Registration Number</h3>
                    <p class="regi_num"></p>
                </div>
                <div class="section">
                    <h3>Department</h3>
                    <p class="dept"></p>
                </div>
                <div class="section">
                    <div class="section-header">
                        <h3>Skills</h3>
                    </div>
                    <div class="skills">
                        <p class="skill-text"></p>
                    </div>
                    
                </div>
                <button class="report-btn" id="openReportForm">Report User</button>
                <div class="report-form hidden" id="reportForm">
                    <h3>Report User</h3>

                    <input
                        type="text"
                        id="reportReason"
                        placeholder="Reason"
                        class="report-input"
                    >

                    <textarea
                        id="reportDescription"
                        placeholder="Describe the issue"
                        class="report-textarea"
                    ></textarea>

                    <button class="submit-report-btn" id="submitReportBtn">Submit Report</button>
                </div>
                <div class="space"></div>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="topbar">
            <input type="text" placeholder="🔍Search projects..." class="search-box">
        </div>

        <div class="feed">

            <div id="post-container">

            </div>

        </div>
    </div>

    <script src="userDetails.js"></script>

</body>

</html>
