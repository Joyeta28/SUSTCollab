<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - SUSTCollab</title>
    <link rel="stylesheet" href="../profile/profile.css">
</head>
<body>

    <div class="sidebar">
        <div class="logo">SUSTCollab</div>

        <div class="profile-container">
            <div class="profile-card">
                <div class="profile-avatar"></div>

                <h2 class="username">Loading...</h2>
                <p class="email"></p>

                <div class="section">
                    <h3>About</h3>
                    <p class="about-text"></p>
                </div>

                <div class="section">
                    <h3>Registration Number</h3>
                    <p class="regi_num"></p>
                </div>

                <div class="section">
                    <h3>Department</h3>
                    <p class="dept"></p>
                </div>

                <div class="section">
                    <h3>Skills</h3>
                    <div class="skills"></div>
                </div>

                <a href="/user/user.html" class="create-btn">Back to Search</a>
            </div>
        </div>
    </div>

    <script src="userProfile.js"></script>
</body>
</html>
